exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    ".venv",
]
line-length = 100
indent-width = 4
target-version = "py312"

[lint]
select = [
    "B",   # flake8-bugbear
    "C4",  # McCabe complexity
    "C90", # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "E",   # pycodestyles
    "F",   # pyflakes
    "I",   # isort
    "T",   # flake8-print
    "UP",  # pyupgrade
]
ignore = ["F403", "TID252", "B008"]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.mccabe]
max-complexity = 18

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
